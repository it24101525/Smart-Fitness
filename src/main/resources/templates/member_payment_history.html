<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fitness - My Payments</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(to bottom right, #1a1c2e, #14162a); color: #fff; }
        .glass-effect { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .scale-hover:hover { transform: scale(1.02); transition: transform 0.3s ease; }
    </style>
</head>
<body>
<div class="flex h-screen overflow-hidden">
    <!-- Sidebar Navigation (Same as member dashboard) -->
    <aside class="hidden lg:flex flex-col w-64 h-screen glass-effect flex-shrink-0">
        <div class="p-6">
            <a href="#" class="flex items-center gap-3">
                <div class="bg-gradient-to-r from-purple-500 to-blue-500 p-2.5 rounded-lg">
                    <i class="fas fa-dumbbell text-white"></i>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">Smart Fitness</h1>
            </a>
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="/user/dashboard" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition-all duration-300">
                <i class="fas fa-th-large"></i><span class="font-medium">Dashboard</span>
            </a>
            <a href="/member/sessions" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition-all duration-300">
                <i class="fas fa-calendar-check"></i><span class="font-medium">Live Sessions</span>
            </a>
            <a href="/user/payment-history" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gradient-to-r from-purple-600 to-blue-600 text-white">
                <i class="fas fa-receipt"></i><span class="font-medium">My Payments</span>
            </a>
            <a href="/user/schedule" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition-all duration-300">
                <i class="fas fa-calendar"></i><span class="font-medium">Schedule</span>
            </a>
        </nav>
        <div class="p-4 border-t border-white/10">
            <a href="/logout">
                <button class="w-full mt-2 bg-white/10 hover:bg-white/20 text-white rounded-xl p-2.5 flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i><span>Log Out</span>
                </button>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-6xl mx-auto">
            <header class="mb-8">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">My Invoices & Payments</h1>
                <p class="text-gray-400 mt-2">View your membership purchase history.</p>
            </header>

            <div th:if="${success}" class="bg-green-500/20 text-green-300 px-4 py-3 rounded-lg mb-6 flex items-center">
                <i class="fas fa-check-circle mr-2"></i><span th:text="${success}"></span>
            </div>
            
            <div class="glass-effect rounded-xl overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 border-b border-white/10 text-gray-300 text-sm">
                            <th class="px-6 py-4 font-semibold">Invoice #</th>
                            <th class="px-6 py-4 font-semibold">Date</th>
                            <th class="px-6 py-4 font-semibold">Purchased Plan</th>
                            <th class="px-6 py-4 font-semibold">Payment Method</th>
                            <th class="px-6 py-4 font-semibold">Amount</th>
                            <th class="px-6 py-4 font-semibold">Status</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/10">
                        <tr th:if="${#lists.isEmpty(myPayments)}">
                            <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                                You have not made any payments yet.
                            </td>
                        </tr>
                        <tr th:each="payment : ${myPayments}" class="hover:bg-white/5 transition-colors">
                            <td class="px-6 py-4 text-gray-400 font-mono text-sm" th:text="'INV-' + ${payment.id}"></td>
                            <td class="px-6 py-4 text-gray-300 text-sm" th:text="${#temporals.format(payment.paymentDate, 'MMM dd, yyyy h:mm a')}"></td>
                            <td class="px-6 py-4 font-medium text-white" th:text="${payment.planName}"></td>
                            <td class="px-6 py-4">
                                <span class="text-xs bg-gray-800 text-gray-300 px-2.5 py-1 rounded-full border border-gray-700 font-medium tracking-wide uppercase">
                                    <i class="fas fa-credit-card mr-1"></i> <span th:text="${payment.paymentMethod}"></span>
                                </span>
                            </td>
                            <td class="px-6 py-4 font-semibold text-green-400 text-lg" th:text="'$' + ${payment.amount}"></td>
                            <td class="px-6 py-4">
                                <span th:if="${payment.status == 'PENDING'}" class="px-3 py-1 text-xs font-bold rounded-full bg-orange-500/20 text-orange-400">PENDING</span>
                                <span th:if="${payment.status == 'VERIFIED' or payment.status == 'completed'}" class="px-3 py-1 text-xs font-bold rounded-full bg-green-500/20 text-green-400">VERIFIED</span>
                                <span th:if="${payment.status == 'REJECTED' or payment.status == 'failed'}" class="px-3 py-1 text-xs font-bold rounded-full bg-red-500/20 text-red-400">FAILED</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </main>
</div>
</body>
</html>
